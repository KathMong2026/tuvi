<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hoàng Lịch — Xem Ngày Tốt Xấu | Huyền Cơ Đường</title>
<meta name="description" content="Xem hoàng lịch hôm nay: ngày tốt xấu, nghi kỵ, xung sát, giờ hoàng đạo, ngũ hành, 28 sao, cửu tinh.">
<meta name="theme-color" content="#C23B22"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,500;0,600;0,700;0,900;1,400&family=Noto+Serif+TC:wght@300;400;500;600;700&family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#ece1c5;--paper-0:#ece1c5;--paper-1:#e0d5b0;
  --bg:#ece1c5;--bg-elev:#f6efd9;--bg-sunk:#e5d8bd;--surface-card:#f6efd9;
  --ink-0:#1A1612;--ink-1:#3D3229;--ink-2:#6B5E53;--ink-3:#9C8E80;
  --vermilion-0:#9c2a1c;--vermilion:#9c2a1c;
  --fg-muted:#7A6E63;--fg-subtle:#A99B8E;
  --xjt-border:#D6C9B9;--xjt-border-strong:#BEAE98;
  --gold-0:#b8893b;--jade-0:#3f5a3e;
  --font-serif:'Noto Serif SC','Noto Serif',serif;
  --font-kai:'Noto Sans SC','Noto Serif',serif;
  --font-mono:'SF Mono','Consolas',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{background:var(--paper);color:var(--ink-0);font-family:'Noto Serif',serif;min-height:100vh;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select{font-family:inherit}
.tc{font-family:'Noto Serif TC',serif}
::selection{background:var(--seal,#9c2a1c);color:var(--surface,#f6efd9)}

.kd-header{position:sticky;top:0;z-index:60;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px 22px;padding:13px clamp(16px,4vw,52px);background:rgba(236,225,197,.88);backdrop-filter:blur(10px);border-bottom:1px solid var(--xjt-border)}
.kd-brand{display:flex;align-items:center;gap:12px}
.kd-seal{width:42px;height:42px;background:var(--seal,#9c2a1c);color:var(--surface,#f6efd9);display:flex;align-items:center;justify-content:center;font-family:'Ma Shan Zheng',cursive;font-size:28px;border-radius:3px;box-shadow:0 2px 0 rgba(0,0,0,.2)}
.kd-brand .name{font-size:20px;font-weight:700;line-height:1.12;color:var(--ink-0)}
.kd-brand .sub{font-size:11px;color:var(--vermilion-0);font-family:'Noto Serif TC',serif;letter-spacing:.38em;padding-left:.38em;line-height:1.2}
.kd-nav{display:flex;align-items:center;gap:clamp(10px,2.2vw,30px);flex-wrap:wrap;font-size:16px}
.kd-nav a{padding-bottom:3px;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;color:var(--ink-1)}
.kd-nav a:hover{color:var(--vermilion-0);border-bottom-color:var(--vermilion-0)}
.kd-nav a.active{color:var(--vermilion-0);border-bottom-color:var(--vermilion-0)}

.wrap{max-width:1200px;margin:0 auto;padding:clamp(28px,5vw,52px) clamp(14px,3.5vw,40px)}

.kicker{display:inline-flex;align-items:center;gap:10px;font-family:var(--font-kai);color:var(--vermilion-0);font-size:14px;letter-spacing:.3em;margin-bottom:14px}
.kicker-line{width:20px;height:1px;background:currentColor}
.alm-title{font-family:var(--font-serif);font-weight:700;font-size:clamp(28px,3.4vw,44px);color:var(--ink-0);margin:0;letter-spacing:.05em;line-height:1.25}

.alm-nav{margin-top:40px;border:1px solid var(--xjt-border-strong);width:fit-content;max-width:100%;margin-left:auto;margin-right:auto;background:var(--bg-elev);display:grid;grid-template-columns:auto 1fr auto auto;align-items:stretch}
.alm-nav-btn{padding:10px 18px;font-family:var(--font-serif);font-size:13px;letter-spacing:.2em;color:var(--ink-2);background:transparent;display:inline-flex;align-items:center;justify-content:center;line-height:1;height:100%;width:100%}
.alm-nav-arrow{width:18px;height:18px}
.alm-nav-center{padding:10px 24px;border-left:1px solid var(--xjt-border-strong);border-right:1px solid var(--xjt-border-strong);display:flex;align-items:center;justify-content:center;gap:14px}
.alm-date-input{font-family:var(--font-serif);font-size:14px;background:transparent;border:none;outline:none;color:var(--ink-0);letter-spacing:.05em;min-width:0}
.alm-today-btn{padding:10px 18px;background:var(--seal,#9c2a1c);color:var(--surface,#f6efd9);font-family:var(--font-serif);font-size:13px;letter-spacing:.2em;border-left:1px solid var(--xjt-border-strong)}
.alm-date-str{margin-top:14px;text-align:center;font-family:var(--font-kai);font-size:13px;color:var(--fg-muted);letter-spacing:.2em}
.alm-lunar-str{margin-top:4px;text-align:center;font-family:var(--font-kai);font-size:13px;color:var(--vermilion-0);letter-spacing:.25em}

.frame-double{position:relative;padding:36px 28px;border:1px solid var(--xjt-border-strong);background:var(--bg-elev);text-align:center}
.frame-double-inner{position:absolute;inset:4px;border:1px solid var(--xjt-border-strong);pointer-events:none}
.frame-double::after{content:'';position:absolute;top:-2px;left:-2px;width:14px;height:14px;background:var(--vermilion-0)}
.frame-double::before{content:'';position:absolute;top:-2px;right:-2px;width:14px;height:14px;background:var(--vermilion-0)}
.corner-bl{position:absolute;bottom:-2px;left:-2px;width:14px;height:14px;background:var(--vermilion-0);z-index:1}
.corner-br{position:absolute;bottom:-2px;right:-2px;width:14px;height:14px;background:var(--vermilion-0);z-index:1}

.alm-year-str{font-family:var(--font-kai);color:var(--vermilion-0);letter-spacing:.35em;font-size:12px}
.alm-big-day{font-family:var(--font-serif);font-size:clamp(96px,14vw,150px);font-weight:900;letter-spacing:.02em;line-height:.9;margin:22px 0;color:var(--ink-0)}
.alm-month-day{font-family:var(--font-serif);font-size:22px;letter-spacing:.2em;color:var(--ink-1);border-top:1px solid var(--xjt-border-strong);padding-top:18px;margin-top:14px}

.alm-badges{display:flex;justify-content:center;gap:10px;margin-top:22px;flex-wrap:wrap}
.alm-badge{padding:8px 14px;border:1px solid var(--xjt-border-strong);background:var(--bg-elev)}
.alm-badge.dark{padding:8px 14px;border:1px solid var(--xjt-border-strong);background:var(--ink-0);color:var(--paper-0)}
.alm-badge-label{font-family:var(--font-kai);font-size:9px;letter-spacing:.3em;opacity:.8}
.alm-badge-value{font-family:var(--font-serif);font-size:16px;font-weight:700;letter-spacing:.1em;margin-top:2px}
.alm-badge.dark .alm-badge-label{opacity:.8;color:var(--paper-0)}
.alm-badge.dark .alm-badge-value{color:var(--paper-0)}

/* Quẻ mini */
.alm-gua{display:inline-flex;align-items:center;gap:8px;margin-top:4px}
.alm-gua-lines{display:inline-flex;flex-direction:column;gap:2px;width:28px;flex-shrink:0}
.alm-gua-line-yang{height:3px;background:var(--ink-0);border-radius:1px}
.alm-gua-line-yin{display:flex;gap:4px;height:3px}
.alm-gua-line-yin span{flex:1;background:var(--ink-0);border-radius:1px}
.alm-gua-name{font-family:var(--font-serif);font-size:16px;font-weight:700;letter-spacing:.08em;color:var(--ink-0)}

/* Nghi Kỵ panels */
.alm-nghi-ky{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.alm-nk-panel{background:var(--bg-elev);border:1px solid var(--xjt-border-strong);display:flex;flex-direction:column}
.alm-nk-header{padding:10px 18px;font-family:var(--font-serif);font-size:14px;font-weight:700;letter-spacing:.3em;display:flex;align-items:center;justify-content:space-between;gap:12px}
.alm-nk-header.yi{background:var(--jade-0);color:var(--paper-0)}
.alm-nk-header.ky{background:var(--seal,#9c2a1c);color:var(--surface,#f6efd9)}
.alm-nk-header.good{background:var(--gold-0);color:var(--ink-0)}
.alm-nk-header.bad{background:var(--ink-0);color:var(--paper-0)}
.alm-nk-body{padding:16px 20px;display:flex;flex-wrap:wrap;row-gap:6px;flex:1}
.alm-nk-item{font-family:var(--font-kai);font-size:15px;color:var(--ink-0);letter-spacing:.08em;padding:3px 0}
.alm-nk-sep{color:var(--xjt-border-strong);margin:0 8px}

/* Smaller info panels */
.alm-info-row{display:grid;gap:12px;margin-top:14px}
.alm-info-row.col3{grid-template-columns:1fr 1fr 1fr}
.alm-info-row.col2{grid-template-columns:1fr 1fr}
.alm-info-card{padding:14px 18px;background:var(--bg-elev);border:1px solid var(--xjt-border)}
.alm-info-card.red{border-left:3px solid var(--vermilion-0)}
.alm-info-card.green{border-left:3px solid var(--jade-0)}
.alm-info-card.gold{border-left:3px solid var(--gold-0)}
.alm-info-label{font-family:var(--font-serif);font-size:11px;font-weight:700;letter-spacing:.3em}
.alm-info-value{font-family:var(--font-serif);font-size:15px;font-weight:700;color:var(--ink-0);letter-spacing:.08em;margin-top:6px;line-height:1.5}

.divider{display:flex;align-items:center;gap:18px;color:var(--fg-subtle);margin:24px 0}
.divider-line{flex:1;height:1px;background:var(--xjt-border-strong)}
.divider-icon{font-size:18px;color:var(--vermilion-0)}

/* SVG pentagon */
.wx-svg-wrap{flex:1;display:flex;justify-content:center;align-items:center}
.wx-svg-text{font-size:14px;font-weight:700;font-family:var(--font-serif)}
.wx-svg-sub{font-size:11px;fill:var(--fg-muted)}

/* Tiết Khí panel */
.tk-bar{height:3px;background:var(--bg-sunk);position:relative;overflow:hidden;margin-top:12px}
.tk-bar-fill{position:absolute;inset:0;width:28%;background:linear-gradient(90deg,var(--jade-0),var(--vermilion-0))}

/* Stages grid */
.stages-grid{display:grid;grid-template-columns:repeat(6,1fr);grid-auto-rows:1fr;gap:6px;flex:1;padding:12px}
.stage-cell{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:8px 2px;background:var(--bg-sunk);color:var(--ink-0);border:1px solid var(--xjt-border)}
.stage-cell.active{background:var(--seal,#9c2a1c);color:var(--surface,#f6efd9);border:1px solid var(--vermilion-0)}
.stage-cell .st-name{font-family:var(--font-serif);font-size:13px;font-weight:700;letter-spacing:.04em}
.stage-cell .st-br{font-family:var(--font-kai);font-size:10px;opacity:.6;margin-top:2px}

/* Hours grid */
.hours-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;padding:14px}
.hour-cell{text-align:center;padding:10px 4px}
.hour-cell.good{border:1px solid var(--jade-0);background:rgba(63,90,62,.07)}
.hour-cell.bad{border:1px solid var(--vermilion-0);background:rgba(168,42,31,.06)}
.hour-cell .h-name{font-family:var(--font-serif);font-size:15px;font-weight:700;color:var(--ink-0);letter-spacing:.08em}
.hour-cell .h-ji{font-family:var(--font-serif);font-size:11px;font-weight:700;letter-spacing:.2em;margin-top:3px}
.hour-cell.good .h-ji{color:var(--jade-0)}.hour-cell.bad .h-ji{color:var(--vermilion-0)}
.hour-cell .h-time{font-family:var(--font-mono);font-size:10px;color:var(--fg-muted);margin-top:3px}

/* Compass */
.compass-wrap{position:relative;width:220px;height:220px;margin:0 auto}
.compass-ring{position:absolute;inset:16px;border:1px solid var(--xjt-border-strong);border-radius:50%}
.compass-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:var(--font-kai);font-size:12px;color:var(--fg-muted);letter-spacing:.2em}
.compass-dir{position:absolute;transform:translate(-50%,-50%);text-align:center;font-weight:700}
.compass-dir.good .cd-name{color:var(--jade-0)}
.compass-dir.bad .cd-name{color:var(--vermilion-0)}

/* 9-star grid */
.star9-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;max-width:260px;margin:0 auto}
.star9-cell{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:4px;border:1px solid var(--xjt-border);background:var(--bg-elev)}
.star9-cell.marked{border:1px solid var(--vermilion-0);background:rgba(194,59,34,.06)}
.star9-name{font-family:var(--font-serif);font-size:14px;font-weight:700;letter-spacing:.05em}
.star9-dir{font-family:var(--font-kai);font-size:10px;color:var(--fg-muted)}
.star9-tag{font-family:var(--font-serif);font-size:10px;font-weight:700;letter-spacing:.15em}
.star9-tag.good{color:var(--jade-0)}.star9-tag.bad{color:var(--vermilion-0)}

.kd-footer{border-top:1px solid rgba(33,29,24,.14);background:rgba(255,255,255,.25);padding:clamp(30px,4vw,46px) clamp(16px,5vw,52px);margin-top:30px}
.kd-footer .row{max-width:1120px;margin:0 auto;display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:18px}
.kd-footer .fbrand{display:flex;align-items:center;gap:12px}
.kd-footer .fseal{width:36px;height:36px;background:var(--seal,#9c2a1c);color:var(--surface,#f6efd9);display:flex;align-items:center;justify-content:center;font-family:'Ma Shan Zheng',cursive;font-size:23px;border-radius:3px}
.kd-footer .ftext{font-size:14px;color:var(--ink-2)}
.kd-footer .flinks{display:flex;gap:20px;font-size:14px;flex-wrap:wrap}
.kd-footer .flinks a{color:var(--ink-2)}
.kd-footer .flinks a:hover{color:var(--vermilion-0)}
.kd-footer .fhan{max-width:1120px;margin:18px auto 0;font-size:12px;color:var(--fg-subtle);font-family:'Noto Serif TC',serif;letter-spacing:.2em}

@media(max-width:768px){
  .alm-info-row.col3{grid-template-columns:1fr 1fr}
  .stages-grid{grid-template-columns:repeat(4,1fr)}
  .hours-grid{grid-template-columns:repeat(3,1fr)}
}
@media(max-width:480px){
  .alm-nghi-ky{grid-template-columns:1fr}
  .alm-info-row.col2{grid-template-columns:1fr}
  .alm-nav{grid-template-columns:1fr 1fr;grid-template-rows:auto auto}
  .alm-nav-center{grid-column:span 2;border-left:none;border-right:none;border-top:1px solid var(--xjt-border-strong);border-bottom:1px solid var(--xjt-border-strong)}
}
</style>
<script src="js/i18n.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/firebase.js"></script>
<script src="js/member.js"></script>
</body>
</html>
