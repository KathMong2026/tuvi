<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>64 Quẻ Dịch — Lục Thập Tứ Quái | Huyền Cơ Đường</title>
<meta name="description" content="Tra cứu 64 quẻ dịch kinh điển — Quái giả, quải dã. Quải vật tượng dĩ kỳ nhân.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Noto+Serif+TC:wght@400;500;600;700&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#ece1c5;--surface:#f6efd9;--input:#fffdf6;--ink:#211d18;--ink-2:#3f372b;--ink-3:#463d30;--ink-4:#5b4f3c;
  --muted:#6b5d48;--faint:#a99878;--seal:#9c2a1c;--dark:#211d18;
  --yang:#211d18;--yin:#9c2a1c;--bg-elev:#f6efd9;--fg-subtle:#a99878;--fg-muted:#6b5d48;
  --ink-0:#211d18;--ink-1:#3f372b;--ink-2:#5b4f3c;
  --vermilion-0:#9c2a1c;--xjt-border-strong:#a89578;--surface-card:#fbf7ef;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--paper);color:var(--ink);font-family:'Noto Serif',serif;min-height:100vh;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none}

.kd-header{position:sticky;top:0;z-index:60;display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:10px 22px;padding:13px clamp(16px,4vw,52px);
  background:rgba(236,225,197,.88);backdrop-filter:blur(10px);border-bottom:1px solid rgba(33,29,24,.14)}
.kd-brand{display:flex;align-items:center;gap:12px}
.kd-seal{width:42px;height:42px;background:var(--seal);color:var(--surface);display:flex;align-items:center;
  justify-content:center;font-family:'Ma Shan Zheng',cursive;font-size:28px;border-radius:3px;box-shadow:0 2px 0 rgba(0,0,0,.2)}
.kd-brand .name{font-size:20px;font-weight:700;line-height:1.12}
.kd-brand .sub{font-size:11px;color:var(--seal);font-family:'Noto Serif TC',serif;letter-spacing:.38em;padding-left:.38em;line-height:1.2}
.kd-nav{display:flex;align-items:center;gap:clamp(10px,2.2vw,30px);flex-wrap:wrap;font-size:16px}
.kd-nav a{padding-bottom:3px;border-bottom:2px solid transparent;transition:color .15s,border-color .15s}
.kd-nav a:hover{color:var(--seal);border-bottom-color:var(--seal)}
.kd-nav a.active{color:var(--seal);border-bottom-color:var(--seal)}

.kd-footer{border-top:1px solid rgba(33,29,24,.14);background:rgba(255,255,255,.25);
  padding:clamp(30px,4vw,46px) clamp(16px,5vw,52px);margin-top:30px}
.kd-footer .row{max-width:1320px;margin:0 auto;display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:18px}
.kd-footer .fbrand{display:flex;align-items:center;gap:12px}
.kd-footer .fseal{width:36px;height:36px;background:var(--seal);color:var(--surface);display:flex;align-items:center;
  justify-content:center;font-family:'Ma Shan Zheng',cursive;font-size:23px;border-radius:3px}
.kd-footer .ftext{font-size:14px;color:var(--ink-4)}
.kd-footer .flinks{display:flex;gap:20px;font-size:14px;flex-wrap:wrap}
.kd-footer .flinks a{color:var(--ink-3)}
.kd-footer .flinks a:hover{color:var(--seal)}
.kd-footer .fhan{max-width:1320px;margin:18px auto 0;font-size:12px;color:var(--faint);
  font-family:'Noto Serif TC',serif;letter-spacing:.2em}

/* ===== HEX PAGE LAYOUT ===== */
.xjt-hex-page{margin-top:48px;display:grid;grid-template-columns:1fr 280px;gap:40px;align-items:start}
@media(max-width:900px){.xjt-hex-page{grid-template-columns:1fr}}

/* ===== HEX GRID ===== */
.xjt-hex-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:4px}
@media(max-width:680px){.xjt-hex-grid{grid-template-columns:repeat(4,1fr)}}

.xjt-hex-cell{padding:14px 6px;background:var(--bg-elev);text-align:center;cursor:pointer;
  transition:background .15s,transform .15s;display:block;text-decoration:none;color:inherit;border-radius:3px}
.xjt-hex-cell:hover{background:#f0e7cc;transform:translateY(-2px)}

/* Yang line */
.hex-yang{position:relative;width:36px;height:3px;margin:2px 0;transition:transform .15s}
.hex-yang div{width:100%;height:100%;background:var(--yang);border-radius:1px}

/* Yin line */
.hex-yin{position:relative;width:36px;height:3px;margin:2px 0;transition:transform .15s}
.hex-yin div{display:flex;width:100%;height:100%;gap:5px}
.hex-yin div span{flex:1 1 0%;background:var(--yin);border-radius:1px}

.hex-label{font-family:'Noto Serif TC',serif;font-size:14px;font-weight:700;letter-spacing:.08em;margin-top:6px;color:var(--ink-0)}
.hex-num{font-family:'Noto Serif TC',serif;font-size:10px;color:var(--fg-subtle);letter-spacing:.2em;margin-bottom:6px}

/* ===== TRY SIDE ===== */
.xjt-hex-tryside{position:sticky;top:80px}
@media(max-width:900px){.xjt-hex-tryside{position:static;max-width:400px;margin:0 auto}}

.xjt-hex-trywrap{position:relative}
.xjt-hex-trywrap h3{font-family:'Noto Serif',serif;font-weight:700;font-size:clamp(18px,1.6vw,20px);color:var(--ink-0);margin:0;letter-spacing:.06em;text-align:center}
.xjt-hex-trywrap .try-eyebrow{font-family:'Noto Serif TC',serif;color:var(--vermilion-0);font-size:13px;letter-spacing:.4em;text-align:center;margin-bottom:12px}

.try-frame{position:relative;padding:32px 18px;border:1px solid var(--xjt-border-strong);background:var(--surface-card);margin-top:16px}
.try-frame::before{content:"";position:absolute;inset:4px;border:1px solid var(--xjt-border-strong);pointer-events:none}
.try-corner{position:absolute;width:14px;height:14px;background:var(--vermilion-0)}
.try-corner.tl{top:-2px;left:-2px}.try-corner.tr{top:-2px;right:-2px}
.try-corner.bl{bottom:-2px;left:-2px}.try-corner.br{bottom:-2px;right:-2px}

.try-inner{display:flex;flex-direction:column;align-items:center;gap:6px;position:relative}
.try-inner .gua-name{font-family:'Noto Serif TC',serif;font-weight:800;font-size:clamp(44px,5vw,60px);line-height:1;color:var(--ink-0);letter-spacing:.1em;text-align:center}
.try-inner .gua-num{font-family:'Noto Serif TC',serif;font-size:20px;color:var(--vermilion-0);letter-spacing:.2em;margin-top:8px}

.try-lines{margin:32px 0 16px}
.try-lines .try-line{position:relative;width:100px;height:13px;margin:6px auto;cursor:pointer;transition:transform .15s}
.try-lines .try-line:hover{transform:scaleX(1.05)}
.try-lines .try-line.yang div{width:100%;height:100%;background:var(--yang);border-radius:1px}
.try-lines .try-line.yin div{display:flex;width:100%;height:100%;gap:6px}
.try-lines .try-line.yin div span{flex:1 1 0%;background:var(--yin);border-radius:1px}

.try-trigrams{display:flex;gap:24px;font-family:'Noto Serif',serif;color:var(--ink-2);font-size:13px;letter-spacing:.15em}
.try-hint{color:var(--fg-muted);font-family:'Noto Serif TC',serif;font-size:13px;letter-spacing:.1em;text-align:center;min-height:22px;margin-top:12px}
.try-btn{margin-top:10px;display:inline-block;padding:8px 18px;font-size:12px;letter-spacing:.15em;color:var(--vermilion-0);border:1px solid var(--vermilion-0);border-radius:2px;font-family:'Noto Serif TC',serif;transition:background .15s,color .15s}
.try-btn:hover{background:var(--vermilion-0);color:#fff}

.try-seal{position:absolute;bottom:-6px;right:-6px;width:40px;height:40px;font-size:9px;line-height:1.1;writing-mode:vertical-rl;
  transform:rotate(-8deg);letter-spacing:4px;font-family:'Noto Serif',serif;background:var(--seal);color:var(--surface);
  display:flex;align-items:center;justify-content:center;border-radius:2px}
</style>
<script src="js/i18n.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/firebase.js"></script>
<script src="js/member.js"></script>
</body>
</html>
