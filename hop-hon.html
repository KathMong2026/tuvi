<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hợp Hôn — Song Phương Bát Tự Phối Hợp | Huyền Cơ Đường</title>
<meta name="description" content="Hợp hôn bát tự. Phân tích song phương mệnh bàn, tương sinh tương khắc, phối ngẫu cát hung.">
<meta name="theme-color" content="#9c2a1c"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=Noto+Serif+TC:wght@300;400;500;600;700&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#ece1c5;--surface:#f6efd9;--input:#fffdf6;--ink:#211d18;--ink-2:#3f372b;--ink-3:#463d30;
  --ink-4:#5b4f3c;--muted:#6b5d48;--faint:#a99878;--seal:#9c2a1c;--dark:#211d18;--dark-soft:#cdbf9d;
  --dark-warm:#d98b5f;--line:rgba(33,29,24,.13);--gold:#b8893b;
  --kim:#b8893b;--moc:#4a6741;--thuy:#3a5974;--hoa:#9e3020;--tho:#8b6914;
  --xjt-border-strong:#a89578;--xjt-border:#d9c69f;
  --bg-elev:#f6efe0;--bg-sunk:#efe6d2;--paper-0:#fbf7ef;
  --vermilion-0:#8a2518;--ink-0:#2a1f14;--ink-1:#3a2e1e;--ink-2:#5a4a36;--ink-3:#7a6851;--ink-4:#b3a489;
  --font-serif:'Noto Serif TC','Noto Serif',serif;--font-kai:'Noto Serif',serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{background:radial-gradient(circle at 16% 10%,rgba(255,252,242,.6),transparent 42%),radial-gradient(circle at 86% 90%,rgba(140,100,45,.08),transparent 46%),var(--paper);color:var(--ink);font-family:'Noto Serif',serif;min-height:100vh;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select{font-family:inherit}
.tc{font-family:'Noto Serif TC',serif}
::selection{background:var(--seal);color:var(--surface)}
.wx-kim{color:var(--kim)}.wx-moc{color:var(--moc)}.wx-thuy{color:var(--thuy)}.wx-hoa{color:var(--hoa)}.wx-tho{color:var(--tho)}
.wx-木{color:#4a6741}.wx-火{color:#9e3020}.wx-土{color:#8b6914}.wx-金{color:#b8893b}.wx-水{color:#3a5974}
.wx-金 .ftn2-bz-gan,.wx-金 .ftn2-bz-zhi{color:#b8893b}
.wx-木 .ftn2-bz-gan,.wx-木 .ftn2-bz-zhi{color:#4a6741}
.wx-水 .ftn2-bz-gan,.wx-水 .ftn2-bz-zhi{color:#3a5974}
.wx-火 .ftn2-bz-gan,.wx-火 .ftn2-bz-zhi{color:#9e3020}
.wx-土 .ftn2-bz-gan,.wx-土 .ftn2-bz-zhi{color:#8b6914}

.kd-header{position:sticky;top:0;z-index:60;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px 22px;padding:13px clamp(16px,4vw,52px);background:rgba(236,225,197,.88);backdrop-filter:blur(10px);border-bottom:1px solid rgba(33,29,24,.14)}
.kd-brand{display:flex;align-items:center;gap:12px}
.kd-seal{width:42px;height:42px;background:var(--seal);color:var(--surface);display:flex;align-items:center;justify-content:center;font-family:'Ma Shan Zheng',cursive;font-size:28px;border-radius:3px;box-shadow:0 2px 0 rgba(0,0,0,.2)}
.kd-brand .name{font-size:20px;font-weight:700;line-height:1.12}
.kd-brand .sub{font-size:11px;color:var(--seal);font-family:'Noto Serif TC',serif;letter-spacing:.38em;padding-left:.38em;line-height:1.2}
.kd-nav{display:flex;align-items:center;gap:clamp(10px,2.2vw,30px);flex-wrap:wrap;font-size:16px}
.kd-nav a{padding-bottom:3px;border-bottom:2px solid transparent;transition:color .15s,border-color .15s}
.kd-nav a:hover{color:var(--seal);border-bottom-color:var(--seal)}
.kd-nav a.active{color:var(--seal);border-bottom-color:var(--seal)}

.wrap{max-width:1240px;margin:0 auto;padding:clamp(28px,5vw,52px) clamp(14px,3.5vw,40px)}

/* Titles */
.dual-title{text-align:center;font-family:'Noto Serif TC',serif;color:var(--seal);font-weight:700;font-size:clamp(1.5rem,3.6vw,2.1rem);letter-spacing:.22em;margin:6px 0;padding-left:.22em}
.dual-sub{text-align:center;color:var(--ink-4);font-size:14px;letter-spacing:.12em;margin:0 0 28px}

/* ===== FORM GRID - 2 cột đối xứng ===== */
.hehun-form-grid{display:grid;grid-template-columns:1fr auto 1fr;gap:0;align-items:start;max-width:1200px;margin:0 auto 32px}
@media(max-width:900px){.hehun-form-grid{grid-template-columns:1fr;gap:0}}
.hehun-side-badge{position:absolute;top:-4px;left:16px;z-index:2;background:var(--dark);color:var(--paper);font-family:'Noto Serif TC',serif;font-size:13px;letter-spacing:.15em;padding:5px 16px;border-radius:2px 2px 0 0;font-weight:600}
.hehun-side-badge.alt{background:var(--seal);left:auto;right:16px}
@media(max-width:900px){.hehun-side-badge.alt{right:auto;left:16px}}
.hehun-form-cross{display:flex;align-items:center;justify-content:center;padding:0 18px;font-family:'Ma Shan Zheng',cursive;font-size:clamp(36px,5vw,52px);color:var(--seal);opacity:.55;user-select:none;position:relative}
.hehun-form-cross::before,.hehun-form-cross::after{content:"";position:absolute;left:50%;width:1px;background:rgba(156,42,28,.25);transform:translateX(-50%)}
.hehun-form-cross::before{top:0;height:50px}.hehun-form-cross::after{bottom:0;height:50px}
@media(max-width:900px){.hehun-form-cross{padding:22px 0;transform:rotate(90deg)}}

/* Form card */
.ftn-form-card{position:relative;background:var(--surface);border:1px solid rgba(156,42,28,.35);border-radius:4px;padding:clamp(20px,3vw,32px);box-shadow:0 10px 30px rgba(33,29,24,.10)}
.ftn-form-card::before{content:"";position:absolute;inset:7px;border:1px solid rgba(156,42,28,.18);border-radius:2px;pointer-events:none}
.ftn-form-corner{position:absolute;width:9px;height:9px;background:var(--seal);z-index:1}
.ftn-form-corner.tl{top:-1px;left:-1px}.ftn-form-corner.tr{top:-1px;right:-1px}.ftn-form-corner.bl{bottom:-1px;left:-1px}.ftn-form-corner.br{bottom:-1px;right:-1px}
.ftn-form-title{text-align:center;font-family:'Noto Serif TC',serif;font-size:clamp(1.2rem,2vw,1.5rem);font-weight:700;margin:0 0 10px;letter-spacing:.08em}
.ftn-reassure{display:flex;justify-content:center;flex-wrap:wrap;gap:6px 16px;font-size:12px;color:var(--ink-4);margin-bottom:16px}
.ftn-reassure span::before{content:"✓ ";color:var(--seal)}
.ftn-cal-tabs{display:grid;grid-template-columns:repeat(3,1fr);border:1px solid rgba(33,29,24,.18);border-radius:4px;overflow:hidden;margin-bottom:18px}
.ftn-cal-tab{padding:10px 6px;background:var(--input);border:none;border-right:1px solid rgba(33,29,24,.14);color:var(--ink-3);cursor:pointer;font-size:12px;line-height:1.35;display:flex;flex-direction:column;align-items:center;gap:2px;transition:all .15s}
.ftn-cal-tab:last-child{border-right:none}
.ftn-cal-tab .sub{font-size:10px;color:var(--muted);letter-spacing:0}
.ftn-cal-tab.active{background:var(--dark);color:var(--paper)}
.ftn-cal-tab.active .sub{color:var(--dark-soft)}
.ftn-field-grid{display:flex;flex-direction:column;gap:13px}
.ftn-field-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.ftn-field-row--full{flex-direction:column;align-items:stretch}
.ftn-field-row--full .ftn-field-label{margin-bottom:2px}
.ftn-field-label{font-family:'Noto Serif TC',serif;font-size:13px;color:var(--ink-2);letter-spacing:.12em;min-width:52px;font-weight:500}
.ftn-field-controls{display:flex;gap:6px;flex:1;min-width:0}
.ftn-field-row--full .ftn-field-controls{display:grid;grid-template-columns:1.15fr .85fr .85fr;gap:6px}
.ftn-gender-pick{display:grid;grid-template-columns:1fr 1fr;border:1px solid rgba(33,29,24,.2);border-radius:4px;overflow:hidden;flex:1;min-width:0;max-width:140px}
.ftn-gender-pick button{padding:9px 8px;background:var(--input);border:none;font-size:13px;color:var(--ink-3);cursor:pointer;transition:all .15s}
.ftn-gender-pick button.active{background:var(--seal);color:var(--surface)}
.ftn-input{flex:1;min-width:100px;padding:9px 12px;font-size:13px;color:var(--ink);background:var(--input);border:1px solid rgba(33,29,24,.2);border-radius:4px;outline:none}
.ftn-input:focus,.ftn-select:focus{border-color:var(--seal)}
.ftn-select{flex:1;padding:9px 6px;font-size:13px;color:var(--ink);background:var(--input);border:1px solid rgba(33,29,24,.2);border-radius:4px;outline:none;cursor:pointer}
.ftn-field-hint{display:flex;flex-direction:column;gap:3px;font-size:10.5px;color:var(--muted);line-height:1.6;margin-top:2px}
.ftn-field-hint span::before{content:"※ ";color:var(--seal)}

/* CTA */
.btn-run-hehun{display:block;width:100%;max-width:420px;margin:32px auto 0;padding:18px;background:var(--seal);color:var(--surface);border:none;border-radius:3px;font-family:'Noto Serif TC',serif;font-size:20px;letter-spacing:.35em;cursor:pointer;box-shadow:0 3px 0 rgba(0,0,0,.2)}
.btn-run-hehun:hover{background:#882318;transform:translateY(-1px)}

/* ===== RESULT GRID ===== */
.ftn2-result-grid{display:grid;grid-template-columns:1.1fr .9fr;gap:22px;align-items:start;margin-top:32px;display:none}
.ftn2-result-grid.show{display:grid}
@media(max-width:860px){.ftn2-result-grid{grid-template-columns:1fr}}
.hehun-charts{border:1px solid var(--xjt-border-strong);background:var(--bg-elev);padding:18px;margin-bottom:18px}
.hehun-charts-title{font-family:var(--font-serif);font-size:17px;font-weight:700;color:var(--ink-0);letter-spacing:.06em;margin-bottom:14px}
.hehun-chart-tabs{display:flex;border:1px solid var(--xjt-border-strong);margin:0 0 14px}
.hehun-chart-tab{flex:1;padding:10px 6px;text-align:center;font-family:var(--font-serif);font-size:13px;letter-spacing:.06em;border-right:1px solid var(--xjt-border-strong);background:transparent;color:var(--ink-2);font-weight:400;cursor:pointer}
.hehun-chart-tab:last-child{border-right:none}
.hehun-chart-tab.active{background:var(--ink-0);color:var(--paper-0);font-weight:700}

/* Bát Tự pillars */
.ftn2-bz-pillars-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0;border:1px solid var(--xjt-border-strong);overflow:hidden}
.ftn2-bz-pillar{position:relative;padding:12px 6px 10px;text-align:center;border-right:1px dashed rgba(33,29,24,.16);background:var(--input)}
.ftn2-bz-pillar:last-child{border-right:none}
.ftn2-bz-pillar.is-day{background:#fbf2e0;box-shadow:inset 0 0 0 1px var(--vermilion-0)}
.ftn2-bz-label{font-size:11px;color:var(--muted);font-family:'Noto Serif TC',serif;margin-bottom:6px;letter-spacing:.08em}
.ftn2-bz-tenstar{font-size:11px;color:var(--ink-3);font-family:'Noto Serif TC',serif;min-height:16px}
.ftn2-bz-tenstar.is-self{color:var(--seal);font-weight:700}
.ftn2-bz-gan{font-size:clamp(26px,3.5vw,36px);font-family:'Noto Serif TC',serif;font-weight:600;line-height:1.15;margin:2px 0}
.ftn2-bz-gan .yy{font-size:10px;color:var(--muted);font-family:'Noto Serif TC',serif;margin-left:2px}
.ftn2-bz-hidden{display:flex;flex-direction:column;gap:2px;min-height:48px;justify-content:center;border-top:1px dashed rgba(33,29,24,.22);border-bottom:1px dashed rgba(33,29,24,.22);margin:6px 2px;padding:5px 0}
.ftn2-bz-hidden-row{display:flex;align-items:center;justify-content:center;gap:4px;font-size:10px}
.ftn2-bz-hidden-row.empty{opacity:.25}
.ftn2-bz-hh-stem{font-family:'Noto Serif TC',serif;font-size:13px;font-weight:600;width:14px}
.ftn2-bz-hh-star{font-family:'Noto Serif TC',serif;color:var(--ink-3);width:26px;text-align:left;font-size:9px}
.ftn2-bz-hh-type{font-size:9px;color:var(--muted)}
.ftn2-bz-zhi{font-size:clamp(24px,3vw,32px);font-family:'Noto Serif TC',serif;font-weight:600;margin-top:4px;line-height:1.15}
.ftn2-bz-meta{margin-top:6px;display:flex;flex-direction:column;gap:2px;font-size:9px;color:var(--muted)}
.ftn2-bz-meta .k{color:var(--ink-4);margin-right:3px}
.ftn2-bz-meta .v{font-family:'Noto Serif TC',serif;color:var(--ink-3)}

/* Wuxing strip */
.ftn2-wx-strip{display:flex;align-items:flex-start;gap:10px;margin-top:14px}
.ftn2-wx-strip-label{font-family:'Noto Serif TC',serif;font-size:12px;color:var(--ink-4);letter-spacing:.15em;writing-mode:vertical-rl;padding-top:4px;flex-shrink:0}
.ftn2-wx-strip-bars{flex:1;display:flex;flex-direction:column;gap:4px}
.ftn2-wx-bar{display:flex;align-items:center;gap:8px;font-size:11px}
.ftn2-wx-bar-track{flex:1;height:7px;background:rgba(33,29,24,.06);border-radius:3px;overflow:hidden}
.ftn2-wx-bar-fill{height:100%;border-radius:3px;transition:width .6s ease}
.ftn2-wx-bar-info{display:flex;gap:4px;min-width:30px;justify-content:flex-end}
.ftn2-wx-bar-info .n{font-family:'Noto Serif TC',serif;font-size:13px;font-weight:700}
.ftn2-wx-bar-info .s{font-size:10px;color:var(--muted);align-self:flex-end}
.wx-木 .ftn2-wx-bar-fill{background:#4a6741}.wx-火 .ftn2-wx-bar-fill{background:#9e3020}
.wx-土 .ftn2-wx-bar-fill{background:#8b6914}.wx-金 .ftn2-wx-bar-fill{background:#b8893b}
.wx-水 .ftn2-wx-bar-fill{background:#3a5974}

/* ===== VERDICT COLUMN ===== */
.hehun-free{border:1px solid var(--xjt-border-strong);background:var(--bg-elev);padding:22px 22px 20px;position:relative}
.hehun-free-head{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.hehun-free-num{width:24px;height:24px;flex-shrink:0;display:grid;place-items:center;background:var(--vermilion-0);color:#fff;font-family:var(--font-serif);font-size:14px;font-weight:700}
.hehun-free-title{font-family:var(--font-serif);font-size:17px;font-weight:700;color:var(--ink-0);letter-spacing:.06em}
.hehun-free-tag{margin-left:auto;font-family:var(--font-kai);font-size:10.5px;letter-spacing:.15em;color:var(--ink-3);border:1px solid var(--xjt-border);padding:3px 9px}
.hehun-score-row{display:flex;align-items:center;gap:18px;margin-bottom:16px}
.hehun-score-dial{width:90px;height:90px;flex-shrink:0;border-radius:50%;border:3px solid;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--paper-0)}
.hehun-score-num{font-family:var(--font-serif);font-size:36px;font-weight:700;line-height:1}
.hehun-score-unit{font-family:var(--font-kai);font-size:10px;color:var(--ink-4);margin-top:2px}
.hehun-score-side{min-width:0}
.hehun-score-label{font-family:var(--font-kai);font-size:11px;letter-spacing:.2em;color:var(--ink-3)}
.hehun-score-band{font-family:var(--font-serif);font-size:22px;font-weight:700;margin:2px 0 6px;letter-spacing:.08em}
.hehun-score-verdict{margin:0;font-family:var(--font-serif);font-size:13px;line-height:1.8;color:var(--ink-1)}
.hehun-free-sec{margin-top:14px}
.hehun-free-sec-tag{font-family:var(--font-kai);font-size:11px;letter-spacing:.2em;color:var(--vermilion-0);border-left:3px solid var(--vermilion-0);padding-left:8px;margin-bottom:8px}
.hehun-comp-list{display:flex;flex-direction:column;gap:7px}
.hehun-comp-row{display:flex;align-items:center;gap:8px}
.hehun-comp-label{flex:0 0 130px;font-size:12px;color:var(--ink-1);display:flex;align-items:baseline;gap:4px;white-space:nowrap}
.hehun-comp-weight{font-size:9px;color:var(--ink-4)}
.hehun-comp-bar{flex:1;height:7px;background:var(--bg-sunk);border:1px solid var(--xjt-border);position:relative;overflow:hidden}
.hehun-comp-fill{position:absolute;left:0;top:0;bottom:0}
.hehun-comp-score{flex:0 0 24px;text-align:right;font-family:var(--font-serif);font-size:13px;font-weight:700}
.hehun-hl-list{margin:0;padding-left:0;list-style:none}
.hehun-hl-list li{font-size:13px;line-height:1.75;color:var(--ink-1);padding:3px 0 3px 16px;position:relative}
.hehun-hl-list li::before{content:'◆';position:absolute;left:0;top:4px;font-size:9px;color:var(--vermilion-0)}
.hehun-chips{display:flex;flex-wrap:wrap;gap:6px}
.hehun-chip{display:inline-flex;align-items:baseline;gap:5px;border:1px solid;padding:4px 8px;font-size:12px;border-radius:2px}
.hehun-chip.is-headline{font-weight:700;box-shadow:inset 0 0 0 1px currentColor}
.hehun-chip b{font-weight:700}
.hehun-chip-chars{font-size:10px;opacity:.85;letter-spacing:.05em}
.hehun-free-cta{margin-top:16px;padding:12px 14px;background:var(--bg-sunk);border-left:3px solid var(--vermilion-0);font-size:12px;line-height:1.7;color:var(--ink-2)}
.hehun-free-disc{margin-top:10px;font-size:10.5px;line-height:1.6;color:var(--ink-4)}
@media(max-width:520px){.hehun-comp-label{flex-basis:100px;font-size:11px}.hehun-score-dial{width:76px;height:76px}.hehun-score-num{font-size:30px}}

.kd-footer{border-top:1px solid rgba(33,29,24,.14);background:rgba(255,255,255,.25);padding:clamp(30px,4vw,46px) clamp(16px,5vw,52px);margin-top:30px}
.kd-footer .row{max-width:1120px;margin:0 auto;display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:18px}
.kd-footer .fbrand{display:flex;align-items:center;gap:12px}
.kd-footer .fseal{width:36px;height:36px;background:var(--seal);color:var(--surface);display:flex;align-items:center;justify-content:center;font-family:'Ma Shan Zheng',cursive;font-size:23px;border-radius:3px}
.kd-footer .ftext{font-size:14px;color:var(--ink-4)}
.kd-footer .flinks{display:flex;gap:20px;font-size:14px;flex-wrap:wrap}
.kd-footer .flinks a{color:var(--ink-3)}
.kd-footer .flinks a:hover{color:var(--seal)}
.kd-footer .fhan{max-width:1120px;margin:18px auto 0;font-size:12px;color:var(--faint);font-family:'Noto Serif TC',serif;letter-spacing:.2em}
@media(max-width:680px){.ftn2-bz-pillars-grid{grid-template-columns:repeat(2,1fr)}}
</style>
<script src="js/i18n.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/firebase.js"></script>
<script src="js/member.js"></script>
</body>
</html>
